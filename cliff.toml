# git-cliff configuration for projectbluefin/common
#
# Generates structured changelogs from Conventional Commits.
# Replaces the raw `git log` heredoc in release.yml.
#
# Deploy to: projectbluefin/common/cliff.toml
# Usage in release.yml:
#   - name: Install git-cliff
#     uses: taiki-e/install-action@<sha>
#     with:
#       tool: git-cliff
#   - name: Generate changelog
#     run: git cliff --latest --strip header > CHANGELOG.md

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}\
  {% if commit.scope %} (**{{ commit.scope }}**){% endif %}\
  ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}
{% endfor %}
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^build", group = "Build" },
  { message = "^test", group = "Testing" },
  { message = "^revert", group = "Reverts" },
  # Skip merge commits and promotion commits
  { message = "^Merge", skip = true },
  { message = "^chore: promote testing", skip = true },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
