name: Run Testsuite

# Reusable wrapper around projectbluefin/testsuite e2e.yml.
# Keeps the testsuite SHA pin in one place for PR, post-merge, and
# promotion-candidate gates in this repo.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image ref to test"
        required: true
        type: string
      suites:
        description: "Comma-separated test suites to run"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@09148fbe481671722b9adbdab61539f1563d3b05 # main
    permissions:
      contents: read
      packages: write
    with:
      image: ${{ inputs.image }}
      suites: ${{ inputs.suites }}
