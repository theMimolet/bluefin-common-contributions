name: lifecycle

on:
  workflow_call:
    inputs:
      brand_name:
        type: string
        default: Project Bluefin

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: ${{ format('lifecycle-{0}-{1}-{2}', github.repository, github.event_name, github.event.issue.number || github.event.pull_request.number || 'schedule') }}
  cancel-in-progress: false

jobs:
  on-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.issue.number }}
      BRAND_NAME: ${{ inputs.brand_name }}
    steps:
      - name: Initialize issue pipeline
        shell: bash
        run: |
          set -euo pipefail

          refresh_issue_json() {
            ISSUE_JSON=$(gh issue view "$NUMBER" --repo "$REPO" --json body,state,stateReason,labels,assignees)
          }

          has_label() {
            local label="$1"
            jq -e --arg label "$label" '.labels[].name == $label' <<<"$ISSUE_JSON" >/dev/null 2>&1
          }

          add_label() {
            local label="$1"
            if ! has_label "$label"; then
              gh issue edit "$NUMBER" --repo "$REPO" --add-label "$label"
              refresh_issue_json
            fi
          }

          update_widget() {
            refresh_issue_json
            export ISSUE_JSON NUMBER BRAND_NAME
            local new_body
            new_body=$(python3 - <<'PY'
          import json
          import os
          import re

          issue = json.loads(os.environ['ISSUE_JSON'])
          number = os.environ['NUMBER']
          brand_name = os.environ['BRAND_NAME']
          labels = [label['name'] for label in issue.get('labels', [])]
          assignees = [assignee['login'] for assignee in issue.get('assignees', [])]
          body = issue.get('body') or ''
          state = issue.get('state', 'OPEN').upper()

          if state == 'CLOSED':
              stage = 'done'
          elif 'status/claimed' in labels:
              stage = 'claimed'
          elif 'status/queued' in labels:
              stage = 'queued'
          elif 'status/discussing' in labels:
              stage = 'discussing'
          else:
              stage = 'triage'

          area = ', '.join([label for label in labels if label.startswith('area/')]) or '—'
          priority = ', '.join([label for label in labels if label.startswith('priority/') or label.startswith('hive/')]) or '—'
          assignee = f" @{assignees[0]}" if assignees else ''
          maintainer_actions = {
              'triage':    'set kind/ + area/ labels, then comment /approve',
              'discussing':'reach consensus, then comment /approve',
              'queued':    '—',
              'claimed':   'review the PR when it opens',
              'done':      '—',
          }
          reporter_actions = {
              'triage':    'answer questions; add repro steps if a bug',
              'discussing':'add spec, context, or requirements to the issue body',
              'queued':    'comment /claim to fix it yourself, or wait for a contributor',
              'claimed':   'test the fix when a PR is ready',
              'done':      '—',
          }
          status_lines = []
          for line_stage, label in [
              ('triage', 'triage     needs kind/ + area/ then /approve'),
              ('discussing', 'discussing —'),
              ('queued', 'queued     —'),
              ('claimed', f'claimed    {assignee.strip()}' if assignee else 'claimed    —'),
              ('done', 'done       —'),
          ]:
              if stage == 'done':
                  marker = '✓'
              elif line_stage == stage:
                  marker = '▶'
              elif line_stage == 'triage' and stage in {'discussing', 'queued', 'claimed'}:
                  marker = '✓'
              elif line_stage == 'queued' and stage in {'claimed'}:
                  marker = '✓'
              else:
                  marker = '·'
              status_lines.append(f'  {marker}  {label}')

          widget = '\n'.join([
              '<!-- factory-pipeline-start -->',
              f'**{brand_name} · issue pipeline**',
              '',
              '```text',
              *status_lines,
              '```',
              '',
              f'**area:** {area} &nbsp; **priority:** {priority}  ',
              f'**maintainer:** {maintainer_actions[stage]}  ',
              f'**reporter:** {reporter_actions[stage]}',
              '<!-- factory-pipeline-end -->',
          ])

          pattern = re.compile(r'<!-- factory-pipeline-start -->.*?<!-- factory-pipeline-end -->', re.S)
          if '<!-- factory-pipeline-start -->' in body and '<!-- factory-pipeline-end -->' in body:
              new_body = pattern.sub(widget, body, count=1)
          else:
              stripped = body.rstrip()
              new_body = f'{stripped}\n\n{widget}' if stripped else widget

          print(new_body)
          PY
            )
            gh issue edit "$NUMBER" --repo "$REPO" --body "$new_body"
          }

          refresh_issue_json

          if ! has_label "status/discussing" \
            && ! has_label "status/triage" \
            && ! has_label "status/queued" \
            && ! has_label "status/claimed" \
            && ! has_label "kind/wontfix"; then
            add_label "status/triage"
          fi

          update_widget

  on-comment:
    if: github.event_name == 'issue_comment' && github.event.action == 'created' && github.event.issue.pull_request == null && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.issue.number }}
      COMMENT_BODY: ${{ github.event.comment.body }}
      COMMENTER: ${{ github.event.comment.user.login }}
      BRAND_NAME: ${{ inputs.brand_name }}
    steps:
      - name: Route slash commands
        shell: bash
        run: |
          set -euo pipefail

          refresh_issue_json() {
            ISSUE_JSON=$(gh issue view "$NUMBER" --repo "$REPO" --json body,state,stateReason,labels,assignees)
          }

          has_label() {
            local label="$1"
            jq -e --arg label "$label" '.labels[].name == $label' <<<"$ISSUE_JSON" >/dev/null 2>&1
          }

          add_label() {
            local label="$1"
            if ! has_label "$label"; then
              gh issue edit "$NUMBER" --repo "$REPO" --add-label "$label"
              refresh_issue_json
            fi
          }

          remove_label() {
            local label="$1"
            if has_label "$label"; then
              gh issue edit "$NUMBER" --repo "$REPO" --remove-label "$label"
              refresh_issue_json
            fi
          }

          comment() {
            local body="$1"
            gh issue comment "$NUMBER" --repo "$REPO" --body "$body" --edit-last --create-if-none
          }

          permission_level() {
            local user="$1"
            gh api "repos/$REPO/collaborators/$user/permission" --jq '.permission' 2>/dev/null || echo none
          }

          require_write_plus() {
            local command="$1"
            local level
            level=$(permission_level "$COMMENTER")
            case "$level" in
              write|maintain|admin)
                ;;
              *)
                comment "❌ \`$command\` requires write access or higher."
                exit 0
                ;;
            esac
          }

          commenter_is_assignee() {
            jq -e --arg user "$COMMENTER" '.assignees[].login == $user' <<<"$ISSUE_JSON" >/dev/null 2>&1
          }

          assign_commenter() {
            if ! jq -e --arg user "$COMMENTER" '.assignees[].login == $user' <<<"$ISSUE_JSON" >/dev/null 2>&1; then
              gh issue edit "$NUMBER" --repo "$REPO" --add-assignee "$COMMENTER" || true
              refresh_issue_json
            fi
          }

          clear_assignees() {
            local assignee
            while IFS= read -r assignee; do
              [[ -z "$assignee" ]] && continue
              gh api "repos/$REPO/issues/$NUMBER/assignees" --method DELETE -f assignees[]="$assignee" >/dev/null || true
            done < <(jq -r '.assignees[].login' <<<"$ISSUE_JSON")
            refresh_issue_json
          }

          update_widget() {
            refresh_issue_json
            export ISSUE_JSON NUMBER BRAND_NAME
            local new_body
            new_body=$(python3 - <<'PY'
          import json
          import os
          import re

          issue = json.loads(os.environ['ISSUE_JSON'])
          number = os.environ['NUMBER']
          brand_name = os.environ['BRAND_NAME']
          labels = [label['name'] for label in issue.get('labels', [])]
          assignees = [assignee['login'] for assignee in issue.get('assignees', [])]
          body = issue.get('body') or ''
          state = issue.get('state', 'OPEN').upper()

          if state == 'CLOSED':
              stage = 'done'
          elif 'status/claimed' in labels:
              stage = 'claimed'
          elif 'status/queued' in labels:
              stage = 'queued'
          elif 'status/discussing' in labels:
              stage = 'discussing'
          elif 'status/triage' in labels:
              stage = 'triage'
          else:
              stage = 'triage'

          area = ', '.join([label for label in labels if label.startswith('area/')]) or '—'
          priority = ', '.join([label for label in labels if label.startswith('priority/') or label.startswith('hive/')]) or '—'
          assignee = f" @{assignees[0]}" if assignees else ''
          maintainer_actions = {
              'triage':    'set kind/ + area/ labels, then comment /approve',
              'discussing':'reach consensus, then comment /approve',
              'queued':    '—',
              'claimed':   'review the PR when it opens',
              'done':      '—',
          }
          reporter_actions = {
              'triage':    'answer questions; add repro steps if a bug',
              'discussing':'add spec, context, or requirements to the issue body',
              'queued':    'comment /claim to fix it yourself, or wait for a contributor',
              'claimed':   'test the fix when a PR is ready',
              'done':      '—',
          }
          status_lines = []
          for line_stage, label in [
              ('triage', 'triage     needs kind/ + area/ then /approve'),
              ('discussing', 'discussing —'),
              ('queued', 'queued     —'),
              ('claimed', f'claimed    {assignee.strip()}' if assignee else 'claimed    —'),
              ('done', 'done       —'),
          ]:
              if stage == 'done':
                  marker = '✓'
              elif line_stage == stage:
                  marker = '▶'
              elif line_stage == 'triage' and stage in {'discussing', 'queued', 'claimed'}:
                  marker = '✓'
              elif line_stage == 'queued' and stage in {'claimed'}:
                  marker = '✓'
              else:
                  marker = '·'
              status_lines.append(f'  {marker}  {label}')

          widget = '\n'.join([
              '<!-- factory-pipeline-start -->',
              f'**{brand_name} · issue pipeline**',
              '',
              '```text',
              *status_lines,
              '```',
              '',
              f'**area:** {area} &nbsp; **priority:** {priority}  ',
              f'**maintainer:** {maintainer_actions[stage]}  ',
              f'**reporter:** {reporter_actions[stage]}',
              '<!-- factory-pipeline-end -->',
          ])

          pattern = re.compile(r'<!-- factory-pipeline-start -->.*?<!-- factory-pipeline-end -->', re.S)
          if '<!-- factory-pipeline-start -->' in body and '<!-- factory-pipeline-end -->' in body:
              new_body = pattern.sub(widget, body, count=1)
          else:
              stripped = body.rstrip()
              new_body = f'{stripped}\n\n{widget}' if stripped else widget

          print(new_body)
          PY
            )
            gh issue edit "$NUMBER" --repo "$REPO" --body "$new_body"
          }

          refresh_issue_json

          command=$(printf '%s\n' "$COMMENT_BODY" | sed -n 's#^/\([A-Za-z-]*\)\(.*\)$#\1#p' | head -n1)
          argument=$(printf '%s\n' "$COMMENT_BODY" | sed -n 's#^/[A-Za-z-]*[[:space:]]*##p' | head -n1)

          if [[ -z "$command" ]]; then
            exit 0
          fi

          case "$command" in
            approve)
              require_write_plus "/approve"
              if has_label "status/queued" || has_label "status/claimed"; then
                exit 0
              fi

              kind_count=$(jq '[.labels[].name | select(startswith("kind/"))] | length' <<<"$ISSUE_JSON")
              area_count=$(jq '[.labels[].name | select(startswith("area/"))] | length' <<<"$ISSUE_JSON")
              if [[ "$kind_count" -ne 1 || "$area_count" -lt 1 ]]; then
                comment "❌ Cannot approve — this issue needs exactly one \`kind/\` label and at least one \`area/\` label. Add them and re-run \`/approve\`."
                exit 0
              fi

              remove_label "status/triage"
              remove_label "status/discussing"
              add_label "status/queued"
              update_widget
              ;;
            claim)
              if has_label "status/hold"; then
                comment "⏸️ This issue is on hold and cannot be claimed until \`/unhold\` runs."
                exit 0
              fi
              if ! has_label "status/queued" || has_label "status/claimed"; then
                exit 0
              fi

              remove_label "status/queued"
              add_label "status/claimed"
              assign_commenter
              update_widget
              ;;
            unclaim)
              if ! has_label "status/claimed"; then
                exit 0
              fi
              if ! commenter_is_assignee; then
                require_write_plus "/unclaim"
              fi

              remove_label "status/claimed"
              add_label "status/queued"
              clear_assignees
              update_widget
              ;;
            wontfix)
              require_write_plus "/wontfix"
              if has_label "kind/wontfix" && jq -r '.state' <<<"$ISSUE_JSON" | grep -qx CLOSED; then
                exit 0
              fi

              add_label "kind/wontfix"
              remove_label "status/triage"
              remove_label "status/discussing"
              remove_label "status/queued"
              remove_label "status/claimed"
              clear_assignees
              gh issue close "$NUMBER" --repo "$REPO" --reason not_planned
              refresh_issue_json
              update_widget
              if [[ -n "${argument// }" ]]; then
                comment "🚫 Closing as not planned. $argument"
              else
                comment "🚫 Closing as not planned."
              fi
              ;;
            hold)
              require_write_plus "/hold"
              if has_label "status/hold"; then
                exit 0
              fi
              add_label "status/hold"
              if [[ -n "${argument// }" ]]; then
                comment "⏸️ Placing this issue on hold. $argument"
              else
                comment "⏸️ Placing this issue on hold."
              fi
              update_widget
              ;;
            unhold)
              require_write_plus "/unhold"
              if ! has_label "status/hold"; then
                exit 0
              fi
              remove_label "status/hold"
              comment "▶️ Removing hold and returning this issue to the active pipeline."
              update_widget
              ;;
            *)
              exit 0
              ;;
          esac

  on-pr-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Add review label
        shell: bash
        run: |
          set -euo pipefail

          labels=$(gh pr view "$NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if ! grep -Fxq 'pr/needs-review' <<<"$labels"; then
            gh pr edit "$NUMBER" --repo "$REPO" --add-label 'pr/needs-review'
          fi

  stale-sweep:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      pull-requests: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      BRAND_NAME: ${{ inputs.brand_name }}
    steps:
      - name: Return stale claims to queue
        shell: bash
        run: |
          set -euo pipefail

          refresh_issue_json() {
            local issue_number="$1"
            ISSUE_JSON=$(gh issue view "$issue_number" --repo "$REPO" --json body,state,stateReason,labels,assignees)
          }

          has_label() {
            local label="$1"
            jq -e --arg label "$label" '.labels[].name == $label' <<<"$ISSUE_JSON" >/dev/null 2>&1
          }

          remove_label() {
            local issue_number="$1"
            local label="$2"
            if has_label "$label"; then
              gh issue edit "$issue_number" --repo "$REPO" --remove-label "$label"
              refresh_issue_json "$issue_number"
            fi
          }

          add_label() {
            local issue_number="$1"
            local label="$2"
            if ! has_label "$label"; then
              gh issue edit "$issue_number" --repo "$REPO" --add-label "$label"
              refresh_issue_json "$issue_number"
            fi
          }

          clear_assignees() {
            local issue_number="$1"
            local assignee
            while IFS= read -r assignee; do
              [[ -z "$assignee" ]] && continue
              gh api "repos/$REPO/issues/$issue_number/assignees" --method DELETE -f assignees[]="$assignee" >/dev/null || true
            done < <(jq -r '.assignees[].login' <<<"$ISSUE_JSON")
            refresh_issue_json "$issue_number"
          }

          update_widget() {
            local issue_number="$1"
            refresh_issue_json "$issue_number"
            export ISSUE_JSON NUMBER="$issue_number" BRAND_NAME
            local new_body
            new_body=$(python3 - <<'PY'
          import json
          import os
          import re

          issue = json.loads(os.environ['ISSUE_JSON'])
          number = os.environ['NUMBER']
          brand_name = os.environ['BRAND_NAME']
          labels = [label['name'] for label in issue.get('labels', [])]
          assignees = [assignee['login'] for assignee in issue.get('assignees', [])]
          body = issue.get('body') or ''
          state = issue.get('state', 'OPEN').upper()

          if state == 'CLOSED':
              stage = 'done'
          elif 'status/claimed' in labels:
              stage = 'claimed'
          elif 'status/queued' in labels:
              stage = 'queued'
          elif 'status/discussing' in labels:
              stage = 'discussing'
          elif 'status/triage' in labels:
              stage = 'triage'
          else:
              stage = 'triage'

          area = ', '.join([label for label in labels if label.startswith('area/')]) or '—'
          priority = ', '.join([label for label in labels if label.startswith('priority/') or label.startswith('hive/')]) or '—'
          assignee = f" @{assignees[0]}" if assignees else ''
          maintainer_actions = {
              'triage':    'set kind/ + area/ labels, then comment /approve',
              'discussing':'reach consensus, then comment /approve',
              'queued':    '—',
              'claimed':   'review the PR when it opens',
              'done':      '—',
          }
          reporter_actions = {
              'triage':    'answer questions; add repro steps if a bug',
              'discussing':'add spec, context, or requirements to the issue body',
              'queued':    'comment /claim to fix it yourself, or wait for a contributor',
              'claimed':   'test the fix when a PR is ready',
              'done':      '—',
          }
          status_lines = []
          for line_stage, label in [
              ('triage', 'triage     needs kind/ + area/ then /approve'),
              ('discussing', 'discussing —'),
              ('queued', 'queued     —'),
              ('claimed', f'claimed    {assignee.strip()}' if assignee else 'claimed    —'),
              ('done', 'done       —'),
          ]:
              if stage == 'done':
                  marker = '✓'
              elif line_stage == stage:
                  marker = '▶'
              elif line_stage == 'triage' and stage in {'discussing', 'queued', 'claimed'}:
                  marker = '✓'
              elif line_stage == 'queued' and stage in {'claimed'}:
                  marker = '✓'
              else:
                  marker = '·'
              status_lines.append(f'  {marker}  {label}')

          widget = '\n'.join([
              '<!-- factory-pipeline-start -->',
              f'**{brand_name} · issue pipeline**',
              '',
              '```text',
              *status_lines,
              '```',
              '',
              f'**area:** {area} &nbsp; **priority:** {priority}  ',
              f'**maintainer:** {maintainer_actions[stage]}  ',
              f'**reporter:** {reporter_actions[stage]}',
              '<!-- factory-pipeline-end -->',
          ])

          pattern = re.compile(r'<!-- factory-pipeline-start -->.*?<!-- factory-pipeline-end -->', re.S)
          if '<!-- factory-pipeline-start -->' in body and '<!-- factory-pipeline-end -->' in body:
              new_body = pattern.sub(widget, body, count=1)
          else:
              stripped = body.rstrip()
              new_body = f'{stripped}\n\n{widget}' if stripped else widget

          print(new_body)
          PY
            )
            gh issue edit "$issue_number" --repo "$REPO" --body "$new_body"
          }

          owner="${REPO%/*}"
          repo_name="${REPO#*/}"

          mapfile -t claimed_numbers < <(gh issue list --repo "$REPO" --state open --label 'status/claimed' --limit 200 --json number --jq '.[].number')

          for issue_number in "${claimed_numbers[@]}"; do
            refresh_issue_json "$issue_number"
            if has_label 'status/hold'; then
              continue
            fi

            # shellcheck disable=SC2016  # $owner/$name/$number are GraphQL variables, not shell
            issue_data=$(gh api graphql \
              -f query='query($owner:String!, $name:String!, $number:Int!) { repository(owner:$owner, name:$name) { issue(number:$number) { updatedAt labels(first:100) { nodes { name } } assignees(first:20) { nodes { login } } timelineItems(itemTypes:[CROSS_REFERENCED_EVENT], first:100) { nodes { ... on CrossReferencedEvent { source { __typename ... on PullRequest { updatedAt } } } } } } } }' \
              -f owner="$owner" \
              -f name="$repo_name" \
              -F number="$issue_number")

            stale=$(ISSUE_DATA="$issue_data" python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta, timezone

          payload = json.loads(os.environ['ISSUE_DATA'])
          issue = payload['data']['repository']['issue']
          latest = datetime.fromisoformat(issue['updatedAt'].replace('Z', '+00:00'))
          for node in issue['timelineItems']['nodes']:
              source = node.get('source') or {}
              if source.get('__typename') != 'PullRequest' or not source.get('updatedAt'):
                  continue
              updated = datetime.fromisoformat(source['updatedAt'].replace('Z', '+00:00'))
              if updated > latest:
                  latest = updated
          print('true' if latest <= datetime.now(timezone.utc) - timedelta(days=7) else 'false')
          PY
            )

            if [[ "$stale" != 'true' ]]; then
              continue
            fi

            # shellcheck disable=SC2016  # backtick-quoted /claim is markdown, not a shell expression
            gh issue comment "$issue_number" --repo "$REPO" --body '⏰ This claim has been inactive for 7 days. Returning to queue — comment `/claim` to re-take.' --edit-last --create-if-none
            remove_label "$issue_number" 'status/claimed'
            add_label "$issue_number" 'status/queued'
            clear_assignees "$issue_number"
            update_widget "$issue_number"
          done
