# hive-progress-sync — posts Common queue stats to the projectbluefin org
# project board (todo.projectbluefin.io) hourly and on every push to main.
#
# Tracks: status/queued, status/claimed, hive/p0, hive/p1 counts
# CI status: build.yml (common's primary build workflow)
#
# Also syncs all open epics (kind/epic) and P0/P1 issues (hive/p0, hive/p1,
# priority/p0, priority/p1) from all factory repos to the project board as
# cards. addProjectV2ItemById is idempotent — safe to run hourly.
#
# Requires: PROJECT_TOKEN secret with project + read:project OAuth scopes
#   and read access to all factory repos (org PAT or GitHub App token)
# Project board: PVT_kwDOCCE0ds4BLZBC (todo.projectbluefin.io, #2)

name: Hive Progress Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '20 * * * *'  # offset from bluefin's :15 and knuckle's :30 syncs
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: read

    steps:
      - name: Post common queue status to project board
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os
          from datetime import datetime, timezone

          PROJECT_ID    = "PVT_kwDOCCE0ds4BLZBC"
          REPO          = "projectbluefin/common"
          ISSUES_URL    = f"https://github.com/{REPO}/issues"
          DASHBOARD_URL = "https://github.com/orgs/projectbluefin/projects/2"

          def gh(*args):
              result = subprocess.run(
                  ["gh"] + list(args),
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"gh error: {result.stderr}", file=sys.stderr)
                  sys.exit(1)
              return result.stdout.strip()

          # CI status: latest completed build.yml run
          ci_raw  = gh("run", "list", "--repo", REPO, "--workflow", "build.yml",
                       "--branch", "main", "--status", "completed",
                       "--limit", "1", "--json", "conclusion")
          ci_runs = json.loads(ci_raw)
          if ci_runs and ci_runs[0].get("conclusion") == "success":
              ci = "CI ✅"
          elif ci_runs and ci_runs[0].get("conclusion") in ("failure", "startup_failure"):
              ci = "CI ❌"
          else:
              ci = "CI ⏳"

          # Queue counts
          def count_label(label):
              raw = gh("issue", "list", "--repo", REPO,
                       "--label", label, "--state", "open", "--limit", "1000",
                       "--json", "number")
              return len(json.loads(raw))

          n_ready   = count_label("status/queued")
          n_claimed = count_label("status/claimed")
          n_p0      = count_label("hive/p0")
          n_p1      = count_label("hive/p1")

          now_utc = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          p0_fragment = f" · ▲ {n_p0} P0" if n_p0 > 0 else ""
          p1_fragment = f" · {n_p1} P1" if n_p1 > 0 else ""
          status_line = f"`{ci}` · {n_ready} ready · {n_claimed} claimed{p0_fragment}{p1_fragment}"

          body = "\n".join([
              f"### Common 📦",
              "",
              status_line,
              "",
              f"_Updated {now_utc} · [Issue queue]({ISSUES_URL})_",
          ])

          print(f"Status body:\n{body}")

          if n_p0 > 0:
              status = "OFF_TRACK"
          elif n_claimed > 0:
              status = "ON_TRACK"
          else:
              status = "AT_RISK"

          project_token = os.environ.get("PROJECT_TOKEN", "")
          if not project_token:
              print("WARNING: PROJECT_TOKEN not set — skipping project board post", file=sys.stderr)
              sys.exit(0)

          mutation = """
          mutation($projectId: ID!, $body: String!, $status: ProjectV2StatusUpdateStatus!) {
            createProjectV2StatusUpdate(input: {
              projectId: $projectId
              body: $body
              status: $status
            }) {
              statusUpdate { id createdAt }
            }
          }
          """

          result = subprocess.run(
              ["gh", "api", "graphql",
               "-f", f"query={mutation}",
               "-f", f"projectId={PROJECT_ID}",
               "-f", f"body={body}",
               "-f", f"status={status}"],
              capture_output=True, text=True,
              env={**os.environ, "GH_TOKEN": project_token}
          )

          if result.returncode != 0 or '"errors"' in result.stdout:
              print("ERROR posting status update:", file=sys.stderr)
              print(result.stdout, file=sys.stderr)
              print(result.stderr, file=sys.stderr)
              sys.exit(1)

          resp      = json.loads(result.stdout)
          update_id = resp["data"]["createProjectV2StatusUpdate"]["statusUpdate"]["id"]
          print(f"Posted: {update_id}")
          PYEOF
        shell: bash

      - name: Sync epics and P0/P1 issues to project board
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os

          PROJECT_ID = "PVT_kwDOCCE0ds4BLZBC"

          FACTORY_REPOS = [
             "projectbluefin/common",
             "projectbluefin/bluefin",
             "projectbluefin/bluefin-lts",
             "projectbluefin/dakota",
             "projectbluefin/testsuite",
             "projectbluefin/knuckle",
          ]

          AUTO_ADD_LABELS = [
             "kind/epic",
             "hive/p0",
             "hive/p1",
             "priority/p0",
             "priority/p1",
          ]

          project_token = os.environ.get("PROJECT_TOKEN", "")
          if not project_token:
             print("WARNING: PROJECT_TOKEN not set — skipping board sync", file=sys.stderr)
             sys.exit(0)

          def gh(*args, token=None):
             env = {**os.environ, "GH_TOKEN": token or project_token}
             result = subprocess.run(["gh"] + list(args), capture_output=True, text=True, env=env)
             if result.returncode != 0:
                 print(f"gh error: {result.stderr.strip()}", file=sys.stderr)
                 return None
             return result.stdout.strip()

          def get_issues(repo, label):
             raw = gh("issue", "list", "--repo", repo,
                      "--label", label, "--state", "open",
                      "--limit", "100", "--json", "id,number,title")
             if raw is None:
                 return []
             try:
                 return json.loads(raw)
             except json.JSONDecodeError:
                 return []

          ADD_MUTATION = (
             "mutation($p:ID!,$c:ID!){"
             "addProjectV2ItemById(input:{projectId:$p,contentId:$c})"
             "{item{id}}"
             "}"
          )

          def add_to_board(node_id):
             result = subprocess.run(
                 ["gh", "api", "graphql",
                  "-f", f"query={ADD_MUTATION}",
                  "-f", f"p={PROJECT_ID}",
                  "-f", f"c={node_id}"],
                 capture_output=True, text=True,
                 env={**os.environ, "GH_TOKEN": project_token},
             )
             if result.returncode != 0 or '"errors"' in result.stdout:
                 print(f"  warn: failed to add {node_id}: {result.stdout.strip()}", file=sys.stderr)
                 return False
             return True

          seen = set()
          added = 0
          already = 0
          failed = 0

          for repo in FACTORY_REPOS:
             for label in AUTO_ADD_LABELS:
                 issues = get_issues(repo, label)
                 for issue in issues:
                     node_id = issue.get("id")
                     if not node_id or node_id in seen:
                         continue
                     seen.add(node_id)
                     ok = add_to_board(node_id)
                     if ok:
                         added += 1
                         print(f"  + {repo}#{issue['number']} [{label}] {issue['title'][:60]}")
                     else:
                         failed += 1

          print(f"\nBoard sync: {added} ensured, {failed} failures ({len(seen)} unique issues scanned)")
          if failed > 0:
             sys.exit(1)
          PYEOF
        shell: bash
