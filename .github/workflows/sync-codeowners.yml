name: Sync CODEOWNERS triagers block

on:
  push:
    branches: [main]
    paths:
      - .github/CODEOWNERS
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would change without making any API calls'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Require mergeraptor secrets
        run: |
          if [[ -z "${{ secrets.MERGERAPTOR_APP_ID }}" || -z "${{ secrets.MERGERAPTOR_PRIVATE_KEY }}" ]]; then
            echo "::error::MERGERAPTOR_APP_ID and MERGERAPTOR_PRIVATE_KEY must be set as org/repo secrets."
            echo "::error::These are required for cross-repo CODEOWNERS sync. Configure the mergeraptor GitHub App."
            exit 1
          fi

      - name: Get mergeraptor token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.MERGERAPTOR_APP_ID }}
          private-key: ${{ secrets.MERGERAPTOR_PRIVATE_KEY }}
          owner: projectbluefin

      - name: Checkout common
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync triagers block to downstream repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          # Extract the BEGIN/END TRIAGERS block from common's CODEOWNERS
          TRIAGE_BLOCK=$(sed -n '/^# BEGIN TRIAGERS/,/^# END TRIAGERS/p' .github/CODEOWNERS)

          if [[ -z "$TRIAGE_BLOCK" ]]; then
            echo "No TRIAGERS block found in .github/CODEOWNERS — nothing to sync."
            exit 0
          fi

          [[ "${DRY_RUN}" == "true" ]] && echo "[dry-run] No API writes will be made."

          for repo in bluefin bluefin-lts dakota knuckle; do
            echo "--- Syncing $repo ---"

            # Fetch current file
            RESPONSE=$(gh api repos/projectbluefin/$repo/contents/.github/CODEOWNERS)
            SHA=$(echo "$RESPONSE" | jq -r '.sha')
            CURRENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)

            # Skip if the block is already identical
            EXISTING_BLOCK=$(echo "$CURRENT" | sed -n '/^# BEGIN TRIAGERS/,/^# END TRIAGERS/p')
            if [[ "$EXISTING_BLOCK" == "$TRIAGE_BLOCK" ]]; then
              echo "$repo: already up to date, skipping."
              continue
            fi

            # Replace the block: remove old, append new
            NEW=$(echo "$CURRENT" | sed '/^# BEGIN TRIAGERS/,/^# END TRIAGERS/d')
            # Ensure a trailing newline before appending
            NEW=$(printf '%s\n%s\n' "${NEW%$'\n'}" "$TRIAGE_BLOCK")
            ENCODED=$(printf '%s' "$NEW" | base64 -w0)

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "[dry-run] Would update $repo CODEOWNERS (block differs)"
            else
              gh api repos/projectbluefin/$repo/contents/.github/CODEOWNERS \
                --method PUT \
                --field message="chore: sync triagers block from projectbluefin/common" \
                --field content="$ENCODED" \
                --field sha="$SHA"
              echo "$repo: updated."
            fi
          done

      - name: Reconcile triager collaborator permissions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          DESIRED=$(sed -n '/^# BEGIN TRIAGERS/,/^# END TRIAGERS/p' .github/CODEOWNERS \
            | grep -oP '@\K[a-zA-Z0-9][a-zA-Z0-9_-]*' \
            | grep -v 'projectbluefin' \
            | sort -u)

          if [[ -z "$DESIRED" ]]; then
            echo "No triagers listed in sentinel block — skipping permission reconciliation."
            exit 0
          fi

          echo "Desired triagers: $(echo "$DESIRED" | tr '\n' ' ')"
          [[ "${DRY_RUN}" == "true" ]] && echo "[dry-run] No permission changes will be made."

          for repo in common bluefin bluefin-lts dakota knuckle; do
            echo "--- Reconciling permissions for $repo ---"

            CURRENT=$(gh api "repos/projectbluefin/$repo/collaborators?affiliation=direct" \
              --paginate --jq '.[] | select(.permissions.triage == true and .permissions.push == false) | .login' \
              2>/dev/null || echo "")

            while IFS= read -r user; do
              [[ -z "$user" ]] && continue
              if ! echo "$CURRENT" | grep -qx "$user"; then
                if [[ "${DRY_RUN}" == "true" ]]; then
                  echo "[dry-run] Would add @$user to $repo with triage"
                else
                  echo "Adding @$user to $repo with triage"
                  gh api "repos/projectbluefin/$repo/collaborators/$user" \
                    --method PUT \
                    --field permission=triage > /dev/null
                fi
              else
                echo "@$user already has triage on $repo"
              fi
            done <<< "$DESIRED"

            while IFS= read -r user; do
              [[ -z "$user" ]] && continue
              if ! echo "$DESIRED" | grep -qx "$user"; then
                if [[ "${DRY_RUN}" == "true" ]]; then
                  echo "[dry-run] Would remove @$user from $repo"
                else
                  echo "Removing @$user from $repo"
                  gh api "repos/projectbluefin/$repo/collaborators/$user" \
                    --method DELETE > /dev/null
                fi
              fi
            done <<< "$CURRENT"
          done
