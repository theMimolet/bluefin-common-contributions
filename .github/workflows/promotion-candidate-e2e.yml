name: Promotion Candidate E2E

# Common cannot add a full installer gate for downstream repos by itself, but it
# can continuously exercise the exact testing-stream tags that feed promotion.
on:
  schedule:
    - cron: "0 3 * * 2"
  workflow_dispatch:

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Bluefin Testing
            image: ghcr.io/projectbluefin/bluefin:testing
            suites: smoke,common
          - name: Bluefin LTS Testing
            image: ghcr.io/projectbluefin/bluefin:lts-testing
            suites: smoke,common
    name: "E2E — ${{ matrix.name }}"
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/run-testsuite.yml
    with:
      image: ${{ matrix.image }}
      suites: ${{ matrix.suites }}

  notify-on-failure:
    name: "File issue on E2E failure"
    needs: [e2e]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File promotion-blocker issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date +'%Y-%m-%d')
          gh issue create \
            --repo "$REPO" \
            --title "ci: promotion candidate E2E failed — ${DATE}" \
            --body "The Tuesday promotion-candidate E2E suite failed before the weekly promotion window. **Do NOT promote** \`bluefin:testing\` or \`bluefin:lts-testing\` until resolved. Workflow run: ${RUN_URL}" \
            --label "kind/bug" \
            --label "kind/github-action"
