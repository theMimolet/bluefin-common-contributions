name: Validate PR

on:
  pull_request:
    branches:
      - main
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate PR title (Conventional Commits)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          pattern='^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert)(\(.+\))?(!)?: .+'
          if ! echo "$PR_TITLE" | grep -qE "$pattern"; then
            echo "ERROR: PR title does not follow Conventional Commits."
            echo "  Got:      $PR_TITLE"
            echo "  Expected: <type>[optional scope]: <description>"
            echo "  Types:    feat fix chore docs style refactor perf test ci build revert"
            echo "  Example:  fix(ci): prevent workflow from running twice"
            exit 1
          fi
          echo "✓ PR title OK: $PR_TITLE"

      - name: Check AI commit attribution trailers
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          echo "Checking AI commit attribution trailers..."
          mapfile -t commit_data < <(gh api "/repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/commits" \
            --paginate --jq '.[] | "\(.sha):\(.commit.message | @base64)"')
          violations=0
          for line in "${commit_data[@]}"; do
            sha="${line%%:*}"
            msg=$(printf '%s' "${line#*:}" | base64 --decode)
            has_assisted=0
            has_coauthored=0
            echo "$msg" | grep -qE '^Assisted-by:' && has_assisted=1
            echo "$msg" | grep -qF 'Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>' && has_coauthored=1
            if [[ "$has_assisted" -eq 1 && "$has_coauthored" -eq 0 ]]; then
              echo "ERROR: ${sha:0:8} — has 'Assisted-by:' but missing 'Co-authored-by: Copilot'"
              violations=$((violations + 1))
            fi
            if [[ "$has_coauthored" -eq 1 && "$has_assisted" -eq 0 ]]; then
              echo "ERROR: ${sha:0:8} — has 'Co-authored-by: Copilot' but missing 'Assisted-by:'"
              violations=$((violations + 1))
            fi
          done
          if [[ "$violations" -gt 0 ]]; then
            echo ""
            echo "ERROR: $violations commit(s) have incomplete AI attribution trailers."
            echo "AI-authored commits must include BOTH:"
            echo "  Assisted-by: <Model> via GitHub Copilot"
            echo "  Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            echo "See AGENTS.md and docs/factory/agentic-model.md for details."
            exit 1
          fi
          echo "✓ AI attribution check passed (${#commit_data[@]} commits checked)."

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: true


      - name: Check submodule drift
        shell: bash
        run: |
          if git submodule status | grep -E '^[+-]'; then
            echo ""
            echo "ERROR: A submodule is dirty (+) or uninitialized (-)."
            echo "Ensure all submodules are committed at a clean ref."
            exit 1
          fi
          echo "All submodules are clean."

      - name: Install just
        uses: taiki-e/install-action@3bcad52036b48c4f9e2249c2ebd39a428ef3d98f # just
        with:
          tool: just

      - name: Check Just syntax
        shell: bash
        run: just check

      - name: Install shellcheck
        shell: bash
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: Shellcheck helper scripts
        shell: bash
        run: shellcheck -e SC2207 system_files/bluefin/usr/bin/ublue-rollback-helper

      - name: Guard against ublue-os→projectbluefin image ref regressions
        shell: bash
        run: |
          echo "Checking for disallowed ublue-os→projectbluefin OCI image ref changes..."
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          allowed_refs = {
              Path(".github/workflows/promotion-candidate-e2e.yml"): {
                  "ghcr.io/projectbluefin/bluefin:testing",
                  "ghcr.io/projectbluefin/bluefin:lts-testing",
              },
              Path(".github/workflows/e2e.yml"): {
                  "ghcr.io/projectbluefin/bluefin:testing",
                  "ghcr.io/projectbluefin/bluefin:lts-testing",
              },
              Path(".github/workflows/pr-e2e.yml"): {
                  "ghcr.io/projectbluefin/bluefin:testing",
              },
          }
          pattern = re.compile(r"ghcr\.io/projectbluefin/(bluefin|aurora|bazzite)(?::[A-Za-z0-9._-]+)?")
          candidates = [
              path
              for path in Path(".github/workflows").rglob("*.yml")
              if path.name != "validate.yml"
          ]
          candidates += list(Path(".github/workflows").rglob("*.yaml"))
          candidates.append(Path("system_files/bluefin/usr/bin/ublue-rollback-helper"))

          violations = []
          for path in candidates:
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  for match in pattern.finditer(line):
                      ref = match.group(0)
                      if ref in allowed_refs.get(path, set()):
                          continue
                      violations.append(f"{path}:{lineno}:{ref}")

          if violations:
              print("")
              print("ERROR: Found disallowed projectbluefin OCI image refs:")
              for violation in violations:
                  print(f"  - {violation}")
              print("")
              print("Production images are still published at ghcr.io/ublue-os/.")
              print("Only testing-stream tags are allowed under ghcr.io/projectbluefin/bluefin,")
              print("and only in the explicitly whitelisted workflow files:")
              for allowed_path, allowed in allowed_refs.items():
                  print(f"  {allowed_path}: {sorted(allowed)}")
              print("See docs/skills/image-registry.md for details.")
              sys.exit(1)
          PY
          echo "No disallowed image ref changes found."

      - name: Validate dconf lock/override parity
        shell: bash
        run: |
          echo "Checking dconf lock/override parity..."
          LOCK_FILE="system_files/bluefin/etc/dconf/db/distro.d/locks/01-bluefin-locked-settings"
          OVERRIDE_DIR="system_files/bluefin/usr/share/glib-2.0/schemas"

          if [[ ! -f "$LOCK_FILE" ]]; then
            echo "Lock file not found: $LOCK_FILE"
            exit 1
          fi

          MISSING=0
          while IFS= read -r lock_entry; do
            # Skip empty lines and comments
            [[ -z "$lock_entry" || "$lock_entry" == \#* ]] && continue

            # Extract the key name from the dconf path (last path component)
            key=$(basename "$lock_entry")

            # Check if key appears in any override file
            if ! grep -r "$key" "$OVERRIDE_DIR" --include="*.override" -q 2>/dev/null; then
              echo "MISSING: lock entry '$lock_entry' has no corresponding override in $OVERRIDE_DIR"
              MISSING=$((MISSING + 1))
            fi
          done < "$LOCK_FILE"

          if [[ $MISSING -gt 0 ]]; then
            echo ""
            echo "ERROR: $MISSING locked key(s) have no matching override entry."
            echo "Every key in $LOCK_FILE must have a corresponding entry in a .gschema.override file."
            echo "See docs/skills/dconf-consistency.md for details."
            exit 1
          fi
          echo "All locked keys have matching override entries."

      - name: Install pre-commit
        shell: bash
        run: pip install pre-commit

      - name: Cache pre-commit hooks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-${{ runner.arch }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pre-commit-

      - name: Run pre-commit
        shell: bash
        run: pre-commit run --all-files
