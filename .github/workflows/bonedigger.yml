name: bonedigger
on:
  issues:
    types: [opened, labeled, closed]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 9 * * *'

permissions:
  issues: write
  contents: read

jobs:
  bonedigger:
    uses: projectbluefin/bonedigger/.github/workflows/lifecycle.yml@bbbd4cdd3a4daa8adeaf72acf8a7dfed64d2c083
    with:
      brand_name: "Common"
      brand_emoji: "🧱"
    secrets: inherit
