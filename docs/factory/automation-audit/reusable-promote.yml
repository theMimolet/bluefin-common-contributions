# Reusable promotion workflow — projectbluefin/actions/.github/workflows/reusable-promote.yml
#
# Replaces the per-image promote-testing-to-main.yml in:
#   - projectbluefin/bluefin
#   - projectbluefin/bluefin-lts
#   - projectbluefin/dakota
#
# All three repos collapse from ~14 KB / ~14 KB / ~6 KB to a thin caller
# (~30 lines) that supplies the variant list and e2e suite name.
#
# This is the C1 consolidation artifact from consistency-audit.md.
#
# Behavior:
#   1. Resolve current :testing digests for all listed variants
#   2. Write/update .github/release-state.yaml on auto/promote-testing-to-main branch
#   3. Open or fast-forward the always-open squash PR against main
#   4. Add the standard pipeline widget comment if missing
#   5. Apply variant labels and the `kind/release` label
#
# Idempotent: running again with no testing motion is a no-op.
# Concurrency-safe: jobs queued by the per-repo concurrency group.
#
# Inputs accept everything the per-image variants currently differ on, so the
# behavior is identical after migration. Defaults match bluefin's current settings.

name: reusable-promote

on:
  workflow_call:
    inputs:
      variants:
        description: 'JSON array of variant names to track, e.g. ["bluefin","bluefin-dx","bluefin-nvidia"]'
        required: true
        type: string
      e2e_suite:
        description: 'testsuite suite identifier (e.g. "smoke", "common", "lts")'
        required: false
        type: string
        default: 'smoke'
      lts_floor_days:
        description: 'Minimum days between promotions (LTS = 7, others = 0)'
        required: false
        type: number
        default: 0
      pr_title_prefix:
        description: 'Prefix for the promotion PR title'
        required: false
        type: string
        default: 'chore(release): promote testing to main'
      labels:
        description: 'Comma-separated labels to apply to the PR'
        required: false
        type: string
        default: 'kind/release,queue/agent-ready'
      app_id_secret_name:
        description: 'Org secret name for the GitHub App ID'
        required: false
        type: string
        default: 'MERGERAPTOR_APP_ID'
      app_pk_secret_name:
        description: 'Org secret name for the GitHub App private key'
        required: false
        type: string
        default: 'MERGERAPTOR_PRIVATE_KEY'
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read

concurrency:
  # Per-repo group — caller's repo serializes its own promotions
  group: promote-testing-to-main-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  promote:
    name: Resolve digests and maintain promotion PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@<sha> # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@<sha> # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Apply LTS floor (skip if too soon)
        if: inputs.lts_floor_days > 0
        id: lts-floor
        run: |
          set -euo pipefail
          LAST_PROMOTION=$(git log -1 --format=%ct origin/main -- .github/release-state.yaml || echo 0)
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST_PROMOTION) / 86400 ))
          FLOOR=${{ inputs.lts_floor_days }}
          if [ "$AGE_DAYS" -lt "$FLOOR" ]; then
            echo "::notice::LTS floor not met: ${AGE_DAYS}d < ${FLOOR}d — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve testing digests
        if: steps.lts-floor.outputs.skip != 'true'
        id: digests
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          VARIANTS='${{ inputs.variants }}'
          OWNER='${{ github.repository_owner }}'

          # Build release-state.yaml from current :testing tags
          {
            echo "# Auto-generated by reusable-promote.yml — do not edit manually"
            echo "promoted_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "source_branch: testing"
            echo "variants:"
            for variant in $(echo "$VARIANTS" | jq -r '.[]'); do
              DIGEST=$(skopeo inspect "docker://ghcr.io/${OWNER}/${variant}:testing" \
                --format '{{.Digest}}' 2>/dev/null || echo "")
              if [ -z "$DIGEST" ]; then
                echo "::error::Could not resolve digest for ${variant}:testing"
                exit 1
              fi
              echo "  - name: ${variant}"
              echo "    digest: ${DIGEST}"
              echo "    tag: testing"
            done
          } > /tmp/release-state.yaml

          # Hash for change detection
          NEW_HASH=$(sha256sum /tmp/release-state.yaml | cut -d' ' -f1)
          OLD_HASH=$(sha256sum .github/release-state.yaml 2>/dev/null | cut -d' ' -f1 || echo "none")
          echo "new_hash=${NEW_HASH}" >> "$GITHUB_OUTPUT"
          echo "old_hash=${OLD_HASH}" >> "$GITHUB_OUTPUT"

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "::notice::No digest changes since last promotion — nothing to do"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update or create promotion branch
        if: steps.digests.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH=auto/promote-testing-to-main
          git config user.name "mergeraptor[bot]"
          git config user.email "mergeraptor[bot]@users.noreply.github.com"
          git fetch origin "${BRANCH}:${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}"
          git checkout "${BRANCH}"
          # Hard-reset to main so the PR is always a clean squash diff
          git reset --hard origin/main
          mkdir -p .github
          cp /tmp/release-state.yaml .github/release-state.yaml
          git add .github/release-state.yaml
          {
            echo "chore(release): promote testing to main"
            echo
            echo "Variants:"
            yq '.variants[].name' .github/release-state.yaml | sed 's/^/  - /'
            echo
            echo "Auto-generated. Reviewer responsibility: confirm e2e (${{ inputs.e2e_suite }}) is green and bonedigger has no open p0 crashes for these digests."
          } > /tmp/commit-msg.txt
          git commit --file=/tmp/commit-msg.txt
          git push --force-with-lease origin "${BRANCH}"

      - name: Open or update PR
        if: steps.digests.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH=auto/promote-testing-to-main
          EXISTING=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number' || echo "")
          {
            echo "## Promotion"
            echo
            echo "This PR promotes the current \`:testing\` digests to \`:stable\` (or LTS equivalent) on merge."
            echo
            echo '```yaml'
            cat .github/release-state.yaml
            echo '```'
            echo
            echo "### Pre-merge checklist (automated)"
            echo "- [x] Build green"
            echo "- [ ] e2e/${{ inputs.e2e_suite }} green (gates the merge queue)"
            echo "- [ ] cosign verify on each digest"
            echo "- [ ] No open \`hive/p0\` blocking this promotion"
            echo
            echo "### Reviewer responsibility (human gate)"
            echo "Confirm e2e is green and that you are comfortable shipping these digests."
          } > /tmp/pr-body.md

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main --head "${BRANCH}" \
              --title "${{ inputs.pr_title_prefix }} ($(date -u +%Y-%m-%d))" \
              --body-file /tmp/pr-body.md
            PR_NUM=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number')
          else
            gh pr edit "${EXISTING}" \
              --title "${{ inputs.pr_title_prefix }} ($(date -u +%Y-%m-%d))" \
              --body-file /tmp/pr-body.md
            PR_NUM="${EXISTING}"
          fi

          # Apply labels (idempotent)
          IFS=',' read -ra LBL <<< "${{ inputs.labels }}"
          for l in "${LBL[@]}"; do
            gh pr edit "${PR_NUM}" --add-label "${l}" || true
          done
